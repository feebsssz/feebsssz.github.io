- name: "Deep Learning for Multivariate Well Anomaly Detection (SPE ATCE 2026)"
  description: "Designed and implemented supervised Transformer and Temporal Fusion Transformer architectures for time-series anomaly detection on multivariate well sensor data. Benchmarked attention-based models against CNN classifiers and pretrained diffusion models, demonstrating that architecture choice must align with anomaly dynamics: local convolution excels at rapid-onset events while global attention captures long-duration degradation patterns. Findings contributed to an accepted SPE ATCE 2026 paper."
  skills: Transformers, TFT, CNN, sequence classification, anomaly detection, PyTorch
  ref: "SPE ATCE 2026 (abstract submitted, October 2026, Houston)"

- name: "Evaluation of NVIDIA NV-Tesseract-AD Foundation Model"
  description: "Led hands-on technical evaluation of NVIDIA's time-series foundation models across four model iterations (transformer-based, diffusion-based, zero-shot forecasting, and context-enhanced retrieval), serving as primary technical contact in direct collaboration with NVIDIA's model engineers via Cognite. Identified structural limitations of forecast-error-based detection on gradual and periodic anomalies, re-implemented vendor architectures as custom multivariate alternatives trained on domain data, and reported bugs contributing to model improvement. Results adopted by Cognite's Dune team for their application demo at NVIDIA GTC 2025."
  skills: Foundation model evaluation, zero-shot inference, diffusion models, time-series forecasting, benchmarking, Python
  ref: "[NVIDIA NV-Tesseract-AD](https://developer.nvidia.com/blog/advancing-anomaly-detection-for-industry-applications-with-nvidia-nv-tesseract-ad/)"

- name: "Physics-Informed Feature Engineering for Equipment & Well Monitoring"
  description: "Developed thermodynamic and hydraulic features that compress complex multivariate sensor data into interpretable, domain-meaningful signals for anomaly detection. Designed U-ratio (thermal efficiency tracking) for heat exchanger fouling detection, dP/Q (hydraulic resistance) for well tubing health monitoring, and production index frameworks for reservoir productivity diagnostics. These physics-informed representations significantly outperform raw signal inputs in both model robustness and interpretability, and form the basis for production monitoring use cases scoped under the Yggdrasil platform."
  skills: Physics-informed modeling, thermodynamics, fluid mechanics, feature engineering, time-series analysis, Python

- name: "Data-Driven Tortuosity: Drilling Path Quality Prediction (PoC)"
  description: "Designed a two-layer ML approach to predict micro-tortuosity risk from high-frequency drilling signals and quantify its impact on non-productive time (NPT). Developed the analytical framework linking drilling dynamics (torque, drag, vibration patterns) to fine-scale wellbore geometry quality, addressing a gap where standard directional surveys miss critical inter-station deviations. Includes early-warning indicators for stuck pipe, wiper trips, and casing difficulties derived from progressive symptom pattern mining."
  skills: Time-series ML, drilling engineering, feature engineering, predictive modeling, Python

- name: CNN-Based Well Anomaly Detection
  description: Developed a physics-informed deep learning pipeline for anomaly detection on high-frequency well and sensor time-series data. Designed CNN-based classifiers and signal-processing workflows to detect degradation patterns, transient flow abnormalities, and equipment malfunction signatures.
  skills: CNNs, time-series ML, physics-informed modeling, Python, Azure ML

- name: "Machine Learning for Mortgage Risk: An Interpretable Approach (PNC Bank)"
  description: Developed interpretable ML models to assess climate-driven mortgage default risk under macroeconomic and weather uncertainty. Applied SHAP-based explainability to support transparent and decision-relevant risk analysis.
  skills: LSTM, Temporal Fusion Transformer, time-series modeling, interpretable ML, risk analytics, Python

- name: Application of Convolutional Neural Network to Predict Airfoil Lift Coefficient
  description: Early deep learning surrogate model integrating physics-informed constraints to predict aerodynamic coefficients with high accuracy.
  skills: CNNs, surrogate modeling, aerodynamics
  ref: "[AIAA 2018](https://doi.org/10.2514/6.2018-1903)"

- name: Learning Aerodynamics with Neural Networks
  description: Developed a Custom Element Spatial CNN (ESCNN) using coordinate-based inputs to predict aerodynamic behavior with reduced model complexity.
  skills: Data representation, physics-aware ML, deep learning
  ref: "[AIAA 2021](https://doi.org/10.2514/6.2021-0277), [Scientific Reports 2022](https://doi.org/10.1038/s41598-022-10737-6)"

- name: "DockingNet: Deep Neural Network for Airfoil Optimization"
  description: Hybrid generative–predictive neural network for accelerating airfoil design optimization without CFD-based iteration.
  skills: Generative modeling, optimization, lift/drag estimation
  ref: "[AIAA 2022](https://doi.org/10.2514/6.2022-0801)"

- name: "Dedalus: AI-Powered Inventory Assistant (In Progress)"
  description: NLP-enabled assistant for querying fragmented inventory and test data across Excel, Access, and PDF sources; migrated backend to SQLite for structured access and downstream analytics.
  skills: NLP, LLMs, data integration, Python, SQLite

- name: Electrochemical Model for Dissolvable Alloys
  description: Hybrid physics–data model predicting dissolution rates under realistic operating conditions using calibrated regression.
  skills: Multiphysics modeling, regression, electrochemistry

- name: Hemodynamics Surrogate Model (Medical AI)
  description: UNet-based deep learning surrogate model predicting stenotic blood flow fields in seconds from CFD-trained data.
  skills: Deep learning, UNet, biomedical CFD, Python

- name: "Petit Appétit: Weekly Meal & Grocery Planner"
  description: Web-based pipeline for meal planning and grocery list generation using Dask, AWS S3, and web scraping; planned NLP-based extensions.
  skills: Data pipelines, scraping, Dask, Python, Django

- name: Deep Learning Chess AI (Exploratory)
  description: Self-learning chess AI trained using reinforcement learning and neural policy optimization through self-play.
  skills: Reinforcement learning, TensorFlow, policy optimization

- name: COVID-19 and Education Completion Analysis
  description: Global data analysis using UNESCO and World Bank datasets to quantify the impact of COVID-19 on education outcomes.
  skills: Data imputation, regression analysis, clustering, policy-oriented analytics
